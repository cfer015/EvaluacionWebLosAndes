
<style>
  * { box-sizing: border-box; }
  body { margin: 0;}
  .wrap { padding: 1rem 0; font-size: 13px; }
  
  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); font-size: 12px; cursor: pointer; transition: all .15s; font-family: inherit; }
  .filter-btn:hover { background: var(--color-background-secondary); }
  .filter-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }

  table { width: 100%; border-collapse: collapse; }
  th, td { border-bottom: 0.5px solid var(--color-border-tertiary); padding: 0; vertical-align: top; }
  thead th { padding: 10px 12px; font-weight: 500; font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); position: sticky; top: 0; z-index: 2; }
  .col-cat { width: 16%; }
  .col-feat { width: 22%; }
  .col-co { width: 20%; background: rgba(29,158,117,0.05); }
  .col-vx { width: 20%; }
  .col-2c { width: 20%; }

  .section-row td { background: var(--color-background-tertiary); padding: 6px 12px; font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 0.5px solid var(--color-border-secondary); }
  .data-row { cursor: pointer; }
  .data-row:hover td { background: var(--color-background-secondary); }
  .data-row.hidden { display: none; }

  .feat-cell { padding: 10px 12px; color: var(--color-text-primary); font-weight: 500; font-size: 12px; line-height: 1.4; }
  .val-cell { padding: 8px 12px; font-size: 12px; line-height: 1.5; color: var(--color-text-secondary); }
  .val-cell.winner { background: rgba(29,158,117,0.04); }
  .cat-cell { padding: 10px 12px; font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); }

  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; margin-bottom: 2px; }
  .chip-yes  { background: #EAF3DE; color: #3B6D11; }
  .chip-no   { background: #FCEBEB; color: #A32D2D; }
  .chip-par  { background: #FAEEDA; color: #854F0B; }
  .chip-na   { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
  @media (prefers-color-scheme: dark) {
    .chip-yes { background: #27500A; color: #C0DD97; }
    .chip-no  { background: #791F1F; color: #F7C1C1; }
    .chip-par { background: #633806; color: #FAC775; }
  }

  .expand-row { display: none; }
  .expand-row td { padding: 0 12px 12px 12px; font-size: 12px; line-height: 1.6; color: var(--color-text-secondary); }
  .expand-row.open { display: table-row; }
  .expand-inner { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding-top: 8px; border-top: 0.5px solid var(--color-border-tertiary); }
  .expand-col { font-size: 12px; line-height: 1.5; }
  .expand-col strong { display: block; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; font-size: 11px; }

  .legend { display: flex; gap: 16px; margin-bottom: 14px; font-size: 12px; color: var(--color-text-secondary); flex-wrap: wrap; align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 5px; }
  .leg-sq { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  
  .hint { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 12px; }
  .arrow { font-size: 10px; color: var(--color-text-tertiary); float: right; transition: transform .2s; }
  .arrow.open { transform: rotate(90deg); }
</style>

<div class="wrap">
  <div class="legend">
    <span class="leg-item"><span class="leg-sq" style="background:#C0DD97;"></span> Incluido / Cumple</span>
    <span class="leg-item"><span class="leg-sq" style="background:#FAC775;"></span> Parcial / Condicional</span>
    <span class="leg-item"><span class="leg-sq" style="background:#F7C1C1;"></span> No incluido / No acreditado</span>
    <span style="margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;"><span style="width:10px;height:10px;border-radius:2px;background:rgba(29,158,117,0.15);border:1px solid #9FE1CB;display:inline-block;"></span> Postor recomendado</span>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterCat('all')">Todos</button>
    <button class="filter-btn" onclick="filterCat('empresa')">Empresa</button>
    <button class="filter-btn" onclick="filterCat('arquitectura')">Arquitectura</button>
    <button class="filter-btn" onclick="filterCat('seguridad')">Seguridad</button>
    <button class="filter-btn" onclick="filterCat('etica')">Ethical Hacking</button>
    <button class="filter-btn" onclick="filterCat('metodologia')">Metodología</button>
    <button class="filter-btn" onclick="filterCat('equipo')">Equipo</button>
    <button class="filter-btn" onclick="filterCat('soporte')">Soporte / SLA</button>
    <button class="filter-btn" onclick="filterCat('economico')">Económico</button>
  </div>

  <p class="hint">Haz clic en una fila para ver el detalle comparativo</p>

  <table id="comp-table">
    <thead>
      <tr>
        <th class="col-cat">Categoría</th>
        <th class="col-feat">Característica</th>
        <th class="col-co">OM Technology ★</th>
        <th class="col-vx">VALTX</th>
        <th class="col-2c">2Cloud</th>
      </tr>
    </thead>
    <tbody id="tbody">
    </tbody>
  </table>
</div>

<script>
const YES = (t) => `<span class="chip chip-yes">✓ ${t}</span>`;
const NO  = (t) => `<span class="chip chip-no">✗ ${t}</span>`;
const PAR = (t) => `<span class="chip chip-par">~ ${t}</span>`;
const NA  = (t) => `<span class="chip chip-na">— ${t}</span>`;

const rows = [
  // EMPRESA
  { section: 'Perfil de la empresa', cat: 'empresa' },
  { feat:'Años de experiencia', cat:'empresa',
    om: YES('20+ años (grupo)'), vx: YES('24+ años'), c2: PAR('5+ años'),
    om_d:'OM Technology Group fundado en 2014 en Costa Rica. Filial peruana constituida en abril 2022. Más de 20 años de experiencia del grupo en sectores regulados.', vx_d:'Gestión de Servicios Compartidos S.A.C. (VALTX) con más de 24 años de trayectoria en tecnología y BPO a nivel nacional.', c2_d:'2Cloud Peru S.A.C. constituida en 2021. Declara más de 5 años de experiencia en el mercado, aunque la empresa como entidad legal tiene menos de 5 años.' },
  { feat:'Especialización sector financiero', cat:'empresa',
    om: YES('Banca, seguros, AFP'), vx: YES('Banca, fintech, retail'), c2: PAR('Limitada'),
    om_d:'Especialización declarada en sectores regulados: banca, seguros, AFP y fondos de inversión. Clientes activos: Pacifico Seguros, Pacifico Salud, Prima AFP, AFP Siembra, Banco Ademi, Seguros Universal, Total Finance, AFP APS.', vx_d:'Cartera financiera acreditada en Perú: Scotiabank, BBVA, Banco Falabella, Caja Huancayo, Financiera Confianza, Compartamos, Efectiva, Grupo Coril.', c2_d:'Experiencia financiera acreditada principalmente con BNP Paribas Cardif (migración web, seguridad, sistemas financieros). Cartera más limitada en entidades reguladas por SBS.' },
  { feat:'Cobertura geográfica', cat:'empresa',
    om: YES('14 países Latinoamérica'), vx: PAR('Nacional (Perú)'), c2: PAR('Nacional (Perú)'),
    om_d:'Presencia activa en: Chile, Perú, Brasil, México, Guatemala, Honduras, El Salvador, Nicaragua, Panamá, Costa Rica, República Dominicana, Aruba, Colombia, San Kitts & Nevis.', vx_d:'Operación principal en Perú con capacidad de gestionar altos volúmenes operativos nacionales y regionales.', c2_d:'Domicilio legal en Chorrillos, Lima. Sede principal en San Isidro. Cobertura declarada nacional.' },
  { feat:'Certificaciones corporativas', cat:'empresa',
    om: PAR('Sin detalle en propuesta'), vx: YES('ISO 9001 / 14001 / 27001'), c2: PAR('Certificaciones individuales'),
    om_d:'La propuesta técnica no detalla certificaciones corporativas ISO del grupo. Sin embargo, el especialista en ciberseguridad de 2Cloud presentó certificaciones ISO/IEC 27001 Lead Implementer y Auditor individuales.', vx_d:'VALTX mantiene certificaciones corporativas vigentes: ISO 9001 (Gestión de Calidad), ISO 14001 (Gestión Ambiental) e ISO/IEC 27001 (Seguridad de la Información), todas certificadas por AENOR.', c2_d:'No presenta certificaciones corporativas ISO. El especialista en ciberseguridad acredita certificaciones individuales: CISSP, CISO, NIST Cybersecurity Consultant, ISO/IEC 27001 Lead Implementer y Lead Auditor.' },
  { feat:'Partnerships tecnológicos', cat:'empresa',
    om: PAR('No detallados'), vx: YES('IBM, Microsoft Gold, AWS, Oracle, Fortinet'), c2: YES('Partner AWS'),
    om_d:'La propuesta no detalla partnerships tecnológicos formales, aunque acredita uso de servicios AWS, GitHub, Docker y herramientas de la industria.', vx_d:'Partnerships formales vigentes: IBM, Hewlett Packard Enterprise, HPE Networking, Microsoft Gold Certified Partner, Oracle Partner, Lenovo, AWS, UiPath, Rocketbot, Fortinet, Bantotal, Park Place Technologies.', c2_d:'Partner oficial de Amazon Web Services (AWS). Especialista cloud con certificaciones AWS acreditadas.' },

  // ARQUITECTURA
  { section: 'Arquitectura técnica', cat: 'arquitectura' },
  { feat:'Stack tecnológico CMS', cat:'arquitectura',
    om: YES('Drupal 10/11 + NuxtJS 3'), vx: YES('Strapi + Angular 19'), c2: PAR('Laravel + Angular'),
    om_d:'Backend: Drupal 10/11 (PHP 8.2+, Nginx) exponiendo JSON:API. Frontend: NuxtJS 3 (Vue.js, TypeScript, Tailwind CSS) con SSG — páginas pre-renderizadas en CDN con < 100ms de respuesta. Headless CMS con separación total frontend/backend.', vx_d:'CMS headless Strapi en NodeJS. Frontend: Angular 19 LTS (TypeScript, HTML5, CSS3). Backend: microservicios NodeJS + Express en AWS Fargate. Base de datos: PostgreSQL en Amazon RDS.', c2_d:'Frontend: Angular. Backend/CMS: Laravel. Base de datos: MariaDB en RDS. Arquitectura desacoplada pero más convencional. Menos alineada con paradigma headless puro exigido en el TDR.' },
  { feat:'Infraestructura cloud AWS', cat:'arquitectura',
    om: YES('AWS Organizations, 3 cuentas aisladas'), vx: YES('AWS Fargate, ECS, RDS'), c2: PAR('CloudFront, WAF, ALB, EC2, RDS'),
    om_d:'AWS Organizations con 3 cuentas completamente aisladas: losandes-dev, losandes-staging, losandes-prod. VPC multi-AZ con 3 capas de subnets (pública, privada-app, privada-data). ECS Fargate, RDS MySQL Multi-AZ, ElastiCache Redis, S3+CloudFront, WAF en CloudFront Y en ALB, AWS Shield Standard/Advanced, Secrets Manager, CloudTrail, CloudWatch, AWS Config.', vx_d:'VPC dedicada con subredes públicas y privadas. Amazon ECS Fargate. Amazon RDS PostgreSQL Multi-AZ con backups automáticos. S3+CloudFront para FrontEnd. ALB + AWS WAF. AWS Cognito para federación de identidad. AWS Secrets Manager. CloudWatch, CloudTrail y AWS Config.', c2_d:'CloudFront, WAF, ALB, EC2 (no Fargate), RDS MariaDB, S3. Propuesta funcional pero sin el nivel de detalle en separación de ambientes ni AWS Organizations que presentan los otros postores.' },
  { feat:'Separación de ambientes', cat:'arquitectura',
    om: YES('Dev / Staging / Prod aislados (AWS Org)'), vx: PAR('Ambientes por configuración'), c2: PAR('No detallado'),
    om_d:'AWS Organizations crea 3 cuentas AWS independientes. Un error o compromiso en dev no puede afectar producción. Pipelines CI/CD con IAM Roles cross-account con mínimos privilegios.', vx_d:'La propuesta menciona ambientes de Desarrollo, QA y Producción, pero sin el nivel de aislamiento de AWS Organizations. Cuentas compartidas con separación por configuración.', c2_d:'La propuesta no detalla la estrategia de separación de ambientes más allá de mencionar entornos de desarrollo y QA.' },
  { feat:'CI/CD automatizado', cat:'arquitectura',
    om: YES('GitHub Actions + CVE gate ECR'), vx: YES('Git, GitLab, CI/CD'), c2: PAR('Mencionado, sin detalle'),
    om_d:'GitHub Actions para Drupal y NuxtJS. Pipeline bloqueante: si imagen Docker tiene CVE CRITICAL o HIGH sin remediar, el deploy no procede. ECR Enhanced Scanning (AWS Inspector) activo con análisis continuo de CVEs. Branch protection rules y pre-commit hooks (git-secrets).', vx_d:'Git y GitLab para control de versiones. CI/CD mencionado en la metodología con despliegue automatizado. SonarQube para análisis estático de código (SAST). No detalla CVE gate en imágenes Docker.', c2_d:'CI/CD mencionado en la propuesta pero sin documentar el pipeline detallado, herramientas específicas ni controles de calidad de imágenes.' },
  { feat:'Migración de contenidos', cat:'arquitectura',
    om: YES('Drupal Migrate API + ETL + redirecciones 301'), vx: YES('Scripts ETL + carga masiva CMS'), c2: YES('Migración estructurada'),
    om_d:'Proceso: crawler completo WordPress → Export XML/SQL → Drupal Migrate API → validación de integridad. Migración de páginas, noticias, productos, imágenes a S3, documentos PDF a S3, metadatos SEO. Tabla de redirecciones 301 completa. Validación WCAG 2.1 AA post-migración.', vx_d:'Migración mediante scripts ETL y cargas masivas en el nuevo CMS. Correlación entre URLs actuales y nuevas (o redirecciones). Gestión de landing pages con plantillas dinámicas y parámetros configurables.', c2_d:'Migración estructurada según mapa de sitio. Validación de integridad. Sin el nivel de detalle técnico del proceso de migración que presenta OM Technology.' },

  // SEGURIDAD
  { section: 'Seguridad y cumplimiento normativo', cat: 'seguridad' },
  { feat:'OWASP ASVS 5.0', cat:'seguridad',
    om: YES('Checklist completo + 10 controles adicionales'), vx: YES('Implementado'), c2: YES('Declarado'),
    om_d:'Checklist OWASP ASVS 5.0 completo con cobertura de: autenticación, sesiones, control de acceso, validación de inputs, criptografía, manejo de errores, logging, configuración y APIs. Adicionalmente incorporó 10 controles de seguridad adicionales identificados en análisis de brechas vs OWASP ASVS 5.0 y PCI DSS.', vx_d:'OWASP ASVS 5.0 declarado e implementado. Herramientas: SonarQube (SAST) y OWASP ZAP. Plan de aseguramiento de calidad de seguridad con pruebas de penetración y verificación contra estándares.', c2_d:'OWASP ASVS declarado en propuesta. El especialista en ciberseguridad (CISSP, NIST Consultant) tiene las credenciales para implementarlo. Sin embargo la propuesta escrita no detalla el checklist de implementación.' },
  { feat:'Headers HTTP de seguridad', cat:'seguridad',
    om: YES('HSTS, CSP nonce-based, X-Frame DENY, Referrer, Permissions-Policy'), vx: YES('HSTS, CSP, cabeceras completas'), c2: YES('HSTS, CSP configurados'),
    om_d:'Response Headers Policy en CloudFront: HSTS max-age=31536000; includeSubDomains; preload. CSP estricta nonce-based para scripts inline. X-Frame-Options: DENY. X-Content-Type-Options: nosniff. Referrer-Policy: strict-origin-when-cross-origin. Permissions-Policy con restricción de geolocalización, cámara, micrófono. TLS 1.2 mínimo, TLS 1.3 preferido.', vx_d:'HSTS (RFC 6797), CSP, X-Frame-Options y demás cabeceras de seguridad implementadas. HTTPS TLS 1.2+. Configuración centralizada con módulo SecKit de Drupal (en la propuesta de OM) o equivalente.', c2_d:'Configuración de cabeceras HSTS y CSP declarada. Eliminación de cookies inseguras (HttpOnly/Secure) y corrección de servicios TLS/SSL obsoletos.' },
  { feat:'Protección panel admin CMS', cat:'seguridad',
    om: YES('Triple capa: WAF por IP + VPN + MFA TOTP'), vx: PAR('Autenticación federada + roles'), c2: PAR('Control de accesos en Laravel'),
    om_d:'3 capas independientes: (1) Regla WAF que bloquea /admin y /user/login para cualquier IP fuera del rango autorizado de CLA → HTTP 403. (2) AWS Client VPN con autenticación mutua por certificados + MFA para acceso remoto. (3) Módulo TFA (Two-factor Authentication) en Drupal que exige TOTP para cualquier acceso al panel, incluso desde IPs autorizadas.', vx_d:'Autenticación federada vía AWS Cognito (SSO SAML/OIDC) para administradores. Gestión de roles y perfiles de usuario. AWS Secrets Manager para credenciales. No detalla bloqueo WAF específico para rutas de administración.', c2_d:'Control de accesos y autenticación implementado en Laravel. La propuesta no detalla restricción de rutas administrativas a nivel WAF ni VPN para acceso remoto.' },
  { feat:'Gestión de secretos', cat:'seguridad',
    om: YES('AWS Secrets Manager + rotación automática'), vx: YES('AWS Secrets Manager'), c2: PAR('No detallado'),
    om_d:'Credenciales de BD, claves de API y hash salts de Drupal inyectadas en runtime desde Secrets Manager. Rotación automática habilitada: credenciales RDS rotan cada 30 días, otros secretos cada 90 días. Acceso desde ECS exclusivamente mediante IAM Role. Auditoría de accesos vía CloudTrail. Sin hardcoding en código ni imágenes Docker.', vx_d:'AWS Secrets Manager para gestión de secretos mencionado en la arquitectura. Sin detallar política de rotación automática ni frecuencia.', c2_d:'La propuesta no menciona gestión centralizada de secretos ni rotación automática de credenciales.' },
  { feat:'Auditoría inmutable (CloudTrail WORM)', cat:'seguridad',
    om: YES('CloudTrail + Object Lock S3 (WORM)'), vx: YES('CloudTrail + CloudWatch'), c2: PAR('No detallado'),
    om_d:'AWS CloudTrail habilitado en todas las cuentas. Logs enviados a bucket S3 dedicado con Object Lock habilitado (WORM — Write Once Read Many). Los logs no pueden ser borrados ni modificados, ni siquiera por el administrador de la cuenta. Alertas SNS sobre eventos críticos: cambios IAM, modificaciones Security Groups, accesos a Secrets Manager. Retención 1 año (logs acceso) y 3 años (logs seguridad/auditoría). Requerido para auditorías SBS.', vx_d:'CloudWatch, CloudTrail y AWS Config para monitoreo, logging y auditoría mencionados en la arquitectura. Sin detalle específico sobre Object Lock WORM ni retención diferenciada de logs.', c2_d:'La propuesta no menciona CloudTrail ni estrategia de logs inmutables para cumplimiento SBS.' },
  { feat:'Compliance continuo (AWS Config)', cat:'seguridad',
    om: YES('AWS Config + reglas activas desde día 1'), vx: PAR('AWS Config mencionado'), c2: NO('No incluido'),
    om_d:'AWS Config habilitado con reglas de compliance activas: rds-no-public, s3-no-public-read, cloudtrail-enabled, restricted-ssh, kms-key-rotation-enabled, mfa-enabled-for-iam-console-access. Dashboard de compliance disponible para auditorías SBS en cualquier momento. Genera evidencia verificable automática.', vx_d:'AWS Config mencionado en la arquitectura como parte de la capa de monitoreo y auditoría, sin detallar las reglas de compliance específicas ni el dashboard para auditorías SBS.', c2_d:'La propuesta no menciona AWS Config ni mecanismos de compliance continuo automatizado.' },
  { feat:'Diagnóstico OWASP Top 10', cat:'seguridad',
    om: YES('Diagnóstico detallado A01–A09'), vx: PAR('Diagnóstico general'), c2: PAR('Mención general'),
    om_d:'Diagnóstico específico del portal actual: A01 Broken Access Control (sin gestión roles robusta), A02 Cryptographic Failures (TLS obsoleto, cookies sin flags), A05 Security Misconfiguration (headers HTTP ausentes), A06 Vulnerable Components (WordPress y plugins desactualizados), A09 Logging Failures (sin logs centralizados). Plan de mitigación por cada categoría.', vx_d:'Diagnóstico general del portal actual: WordPress monolítico con vulnerabilidades críticas, configuraciones por defecto, exposición de metadatos, falta de encabezados de seguridad, riesgo de inyección en formularios.', c2_d:'Diagnóstico general mencionando las limitaciones del WordPress actual sin mapeo explícito al OWASP Top 10.' },

  // ETHICAL HACKING
  { section: 'Ethical Hacking y pruebas de seguridad', cat: 'etica' },
  { feat:'Ethical Hacking incluido en precio', cat:'etica',
    om: YES('2 fases incluidas'), vx: NO('Costo adicional del cliente'), c2: YES('Incluido'),
    om_d:'Fase 1 (Etapa Certificación): Ethical Hacking sobre ambiente staging. Metodología OWASP Testing Guide v4.2. Hallazgos con CVSS v3.1. Remediación + re-test. Fase 2 (Etapa Puesta en Producción): Ethical Hacking sobre producción + re-test aprobado. Ambas fases incluidas en el precio de S/ 102,660.', vx_d:'El Ethical Hacking se ofrece como servicio adicional a solicitud y costo del cliente. Herramientas: Burp Suite y OWASP ZAP. El TDR exige esta prueba antes del pase a producción — debe negociarse e incluirse en el contrato.', c2_d:'Ethical Hacking incluido en el alcance (Etapa de Certificación). Pruebas funcionales, de seguridad y ethical hacking declaradas. El especialista (CISSP, CISO) tiene las credenciales para ejecutarlo.' },
  { feat:'Metodología de pruebas', cat:'etica',
    om: YES('OWASP Testing Guide v4.2 + CVSS v3.1'), vx: PAR('OWASP ZAP + Burp Suite'), c2: PAR('No especificada en detalle'),
    om_d:'Metodología formal: OWASP Testing Guide v4.2. Hallazgos documentados con puntuación CVSS v3.1. Evidencias incluidas. Re-test post-remediación obligatorio antes de pase a producción. Entregable E3.2: Informe de Ethical Hacking Fase 1. Entregable E4.6: Informe Ethical Hacking Fase 2.', vx_d:'Herramientas: Burp Suite y OWASP ZAP. Pruebas de caja gris. Tiempo estimado 15 días luego de finalizar pruebas de usuario. Sin metodología formal documentada (OWASP Testing Guide, CVSS).', c2_d:'Ethical Hacking declarado en la Etapa de Certificación. Especialista con certificaciones CISSP y CISO. Sin detallar la metodología específica ni el formato de entregables del informe.' },
  { feat:'Meta SecurityScorecard', cat:'etica',
    om: YES('≥ 90/100 — compromiso formal'), vx: PAR('Mejora declarada'), c2: PAR('Mejora declarada'),
    om_d:'Meta explícita y formal: SecurityScorecard ≥ 90/100 (calificación "A"). Entregable E3.4: Reporte SecurityScorecard ≥ 90/100 (captura con fecha). Entregable E4.12: Evidencia final SecurityScorecard producción ≥ 90/100. El objetivo está contractualmente vinculado a la conformidad de las etapas.', vx_d:'La propuesta menciona la evaluación con SecurityScorecard en la Etapa de Certificación pero no establece un puntaje mínimo formal como condición de conformidad.', c2_d:'La propuesta menciona mejora del posicionamiento en SecurityScorecard pero sin establecer un objetivo cuantificado ni vincularlo formalmente a entregables de conformidad.' },

  // METODOLOGÍA
  { section: 'Metodología y plan de trabajo', cat: 'metodologia' },
  { feat:'Metodología de desarrollo', cat:'metodologia',
    om: YES('Sprints semanales + seguimiento continuo'), vx: YES('Híbrida (tradicional + ágil)'), c2: YES('Ágil declarada'),
    om_d:'Metodología por sprints de 2 semanas. Etapa 1 (Semanas 1-3 Configuración), Etapa 2 (Semanas 4-17 Construcción y Migración con 7 sprints detallados), Etapa 3 (Semanas 18-23 Certificación), Etapa 4 (Semanas 24-26 Puesta en Producción). Seguimiento continuo con hitos claros.', vx_d:'Metodología híbrida que combina enfoque tradicional con mejores prácticas ágiles. 6 fases: Configuración, Análisis, Diseño, Construcción, Pruebas y Certificación, Despliegue y Post Implantación. Reuniones diarias de 15 minutos (stand-up).', c2_d:'Metodología ágil declarada. Definición de criterios de calidad y entrega de formatos de parametrización en la etapa de Configuración. Sin detalle del número de sprints ni duración de cada uno.' },

function chip(html) { return html; }

function buildTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach((r, idx) => {
    if (r.section !== undefined) {
      const tr = document.createElement('tr');
      tr.className = 'section-row';
      tr.dataset.cat = r.cat;
      tr.innerHTML = `<td colspan="5">${r.section}</td>`;
      tbody.appendChild(tr);
    } else {
      const tr = document.createElement('tr');
      tr.className = 'data-row';
      tr.dataset.cat = r.cat;
      tr.dataset.idx = idx;
      tr.innerHTML = `
        <td class="cat-cell"></td>
        <td class="feat-cell">${r.feat} <span class="arrow" id="arr-${idx}">›</span></td>
        <td class="val-cell winner">${r.om}</td>
        <td class="val-cell">${r.vx}</td>
        <td class="val-cell">${r.c2}</td>
      `;
      tr.addEventListener('click', () => toggleExpand(idx));
      tbody.appendChild(tr);

      const exp = document.createElement('tr');
      exp.className = 'expand-row';
      exp.id = `exp-${idx}`;
      exp.dataset.cat = r.cat;
      exp.innerHTML = `<td colspan="5">
        <div class="expand-inner">
          <div class="expand-col"><strong>OM Technology ★</strong>${r.om_d}</div>
          <div class="expand-col"><strong>VALTX</strong>${r.vx_d}</div>
          <div class="expand-col"><strong>2Cloud</strong>${r.c2_d}</div>
        </div>
      </td>`;
      tbody.appendChild(exp);
    }
  });
}

function toggleExpand(idx) {
  const exp = document.getElementById(`exp-${idx}`);
  const arr = document.getElementById(`arr-${idx}`);
  const isOpen = exp.classList.contains('open');
  document.querySelectorAll('.expand-row.open').forEach(e => e.classList.remove('open'));
  document.querySelectorAll('.arrow.open').forEach(a => a.classList.remove('open'));
  if (!isOpen) { exp.classList.add('open'); arr.classList.add('open'); }
}

let currentCat = 'all';
function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('[data-cat]').forEach(el => {
    el.classList.toggle('hidden', cat !== 'all' && el.dataset.cat !== cat);
  });
  document.querySelectorAll('.expand-row.open').forEach(e => e.classList.remove('open'));
  document.querySelectorAll('.arrow.open').forEach(a => a.classList.remove('open'));
}

buildTable();
